<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glossy Todo App</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: radial-gradient(circle at top,#1f1c2c,#928dab);
  padding:20px;
}

/* MAIN CARD */
.todo-container{
  width:100%;
  max-width:420px;
  background:rgba(255,255,255,0.12);
  backdrop-filter: blur(18px);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:20px;
  padding:22px;
  box-shadow:0 25px 60px rgba(0,0,0,0.4);
}

/* TITLE */
h1{
  text-align:center;
  color:#fff;
  margin-bottom:18px;
  font-weight:600;
  letter-spacing:1px;
}

/* INPUT AREA */
.input-box{
  display:flex;
  gap:10px;
}

input{
  flex:1;
  padding:12px;
  border:none;
  outline:none;
  border-radius:12px;
  background:rgba(255,255,255,0.2);
  color:#fff;
}

input::placeholder{
  color:#eee;
}

/* ADD BUTTON */
button{
  padding:12px 14px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  background:linear-gradient(135deg,#ffd700,#ffb700);
  font-weight:600;
  transition:0.3s;
}

button:hover{
  transform:scale(1.05);
}

/* LIST */
ul{
  list-style:none;
  margin-top:18px;
}

li{
  background:rgba(255,255,255,0.15);
  margin-bottom:10px;
  padding:12px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:#fff;
  transition:0.3s;
}

/* COMPLETED */
li.completed{
  text-decoration:line-through;
  opacity:0.6;
}

/* ACTION BUTTONS */
.actions button{
  background:transparent;
  color:#fff;
  font-size:15px;
  margin-left:8px;
  padding:5px;
}

.actions button:hover{
  color:#ffd700;
  transform:scale(1.2);
}

/* RESPONSIVE */
@media(max-width:480px){
  .todo-container{
    width:100%;
    padding:18px;
  }

  input{
    font-size:13px;
  }

  button{
    padding:10px;
  }
}
</style>
</head>

<body>

<div class="todo-container">
  <h1>My Todo List</h1>

  <div class="input-box">
    <input type="text" id="taskInput" placeholder="Add a new task...">
    <button onclick="addTask()">Add</button>
  </div>

  <ul id="taskList"></ul>
</div>

<script>
const taskInput = document.getElementById("taskInput");
const taskList = document.getElementById("taskList");

function addTask(){
  if(taskInput.value.trim() === ""){
    alert("Please enter a task");
    return;
  }

  const li = document.createElement("li");

  li.innerHTML = `
    <span class="text">${taskInput.value}</span>
    <div class="actions">
      <button onclick="completeTask(this)">✔</button>
      <button onclick="editTask(this)">✏</button>
      <button onclick="deleteTask(this)">✖</button>
    </div>
  `;

  taskList.appendChild(li);
  taskInput.value = "";
}

/* COMPLETE */
function completeTask(btn){
  btn.parentElement.parentElement.classList.toggle("completed");
}

/* DELETE */
function deleteTask(btn){
  btn.parentElement.parentElement.remove();
}

/* EDIT (NEW FEATURE) */
function editTask(btn){
  const li = btn.parentElement.parentElement;
  const span = li.querySelector(".text");

  const newText = prompt("Edit your task:", span.innerText);

  if(newText !== null && newText.trim() !== ""){
    span.innerText = newText;
  }
}
</script>

</body>
</html>
